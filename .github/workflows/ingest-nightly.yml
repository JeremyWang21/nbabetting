name: Nightly Data Ingestion

on:
  schedule:
    # 4am ET = 8am UTC
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -q --no-cache-dir -r requirements.txt

      - name: Setup SSH tunnel to EC2 postgres
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 400 ~/.ssh/ec2.pem
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2.pem \
            -L 5432:localhost:5432 \
            ec2-user@${{ secrets.EC2_HOST }} -N &
          sleep 10

      - name: Run nightly ingestion
        env:
          DATABASE_URL: postgresql+asyncpg://nbabetting:${{ secrets.DB_PASSWORD }}@localhost:5432/nbabetting
          REDIS_URL: redis://localhost:6379/0
        run: |
          python -c "
          import asyncio, traceback
          from src.ingestion.nba_stats_ingester import ingest_game_logs, ingest_season_averages, ingest_todays_games, repair_game_dates
          from src.ingestion.roster_ingester import ingest_roster_updates
          from src.ingestion.defensive_stats_ingester import ingest_defensive_stats

          async def safe(name, coro):
              try:
                  await coro
                  print(f'[OK] {name}')
              except Exception:
                  print(f'[FAIL] {name}')
                  traceback.print_exc()

          async def run():
              await safe('repair_game_dates', repair_game_dates())
              await safe('ingest_roster_updates', ingest_roster_updates())
              await safe('ingest_game_logs', ingest_game_logs())
              await safe('ingest_season_averages', ingest_season_averages())
              await safe('ingest_defensive_stats', ingest_defensive_stats())
              await safe('ingest_todays_games', ingest_todays_games())

          asyncio.run(run())
          "

      - name: Flush all Redis cache on EC2
        run: |
          curl -s -X DELETE \
            -H "x-admin-secret: ${{ secrets.ADMIN_SECRET }}" \
            "https://jprops.xyz/api/v1/admin/cache?pattern=*"
          echo "Cache flushed"
