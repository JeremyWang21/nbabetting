name: Ingest Today's Games

on:
  schedule:
    # Every 30 min, 6pm-8am UTC (2pm-4am ET) — covers all game hours
    - cron: '*/30 18-23 * * *'
    - cron: '*/30 0-8 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -q --no-cache-dir -r requirements.txt

      - name: Setup SSH tunnel to EC2 postgres
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 400 ~/.ssh/ec2.pem
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2.pem \
            -L 5432:localhost:5432 \
            ec2-user@${{ secrets.EC2_HOST }} -N &
          sleep 10

      - name: Run game ingestion
        env:
          DATABASE_URL: postgresql+asyncpg://nbabetting:${{ secrets.DB_PASSWORD }}@localhost:5432/nbabetting
          REDIS_URL: redis://localhost:6379/0
        run: |
          python -c "
          import asyncio, traceback
          from datetime import timedelta
          from sqlalchemy import select
          from src.ingestion.nba_stats_ingester import ingest_todays_games, _ingest_date_schedule, repair_game_dates
          from src.ingestion.roster_ingester import ingest_roster_updates
          from src.db.session import AsyncSessionLocal
          from src.models.game import Game
          from src.utils.date_utils import today_et

          async def safe(name, coro):
              try:
                  await coro
                  print(f'[OK] {name}')
              except Exception:
                  print(f'[FAIL] {name}')
                  traceback.print_exc()

          async def run():
              # Always repair dates and sync scores
              await safe('repair_game_dates', repair_game_dates())
              await safe('ingest_todays_games', ingest_todays_games())

              # If all today's games are final, sync rosters and pre-seed tomorrow
              today = today_et()
              async with AsyncSessionLocal() as s:
                  rows = (await s.execute(select(Game.status).where(Game.game_date == today))).all()
              statuses = [r[0].lower() for r in rows]
              finished = {'final', 'final/ot', 'final/2ot', 'final/3ot'}
              if statuses and all(st in finished for st in statuses):
                  print('All games final — syncing rosters and pre-seeding tomorrow')
                  await safe('ingest_roster_updates', ingest_roster_updates())
                  await safe('_ingest_date_schedule tomorrow', _ingest_date_schedule(today + timedelta(days=1)))

          asyncio.run(run())
          "

      - name: Flush Redis cache on EC2
        run: |
          curl -s -X DELETE \
            -H "x-admin-secret: ${{ secrets.ADMIN_SECRET }}" \
            "https://jprops.xyz/api/v1/admin/cache?pattern=*"
