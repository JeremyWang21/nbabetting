name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 400 ~/.ssh/ec2.pem
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2.pem ec2-user@${{ secrets.EC2_HOST }} \
            "sudo git -C /app pull && sudo docker-compose -f /app/docker-compose.prod.yml up --build -d app"
