<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Props</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--s1:#1a1d27;--s2:#222535;--s3:#2a2d42;
  --border:#2e3148;--text:#e2e8f0;--muted:#6b7280;
  --accent:#6366f1;--adim:#1e1b4b;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* header */
header{background:var(--s1);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
header h1{font-size:16px;font-weight:700}
.hdate{color:var(--muted);font-size:12px}
.spacer{flex:1}
.btn{background:var(--accent);color:#fff;border:none;padding:6px 13px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:var(--s2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent)}
.btn-sm{padding:4px 10px;font-size:12px}

/* sample pills (above chart) */
.sample-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.mpill{background:var(--s2);border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s}
.mpill:hover{border-color:var(--accent);color:var(--text)}
.mpill.on{background:var(--adim);border-color:var(--accent);color:#a5b4fc}
/* min minutes filter */
.min-min-wrap{display:flex;align-items:center;gap:5px;margin-top:8px}
.min-min-wrap label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600;white-space:nowrap}
.min-min-wrap input[type=number]{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:13px;outline:none;width:58px;text-align:center;-moz-appearance:textfield}
.min-min-wrap input[type=number]::-webkit-inner-spin-button,.min-min-wrap input[type=number]::-webkit-outer-spin-button{opacity:1}
.min-min-wrap input[type=number]:focus{border-color:var(--accent)}

/* layout */
.layout{display:flex;flex:1;overflow:hidden}

/* sidebar */
.sidebar{width:270px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;background:var(--s1)}
.sidebar-title{padding:10px 14px 8px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.game-item{border-bottom:1px solid var(--border)}
.game-header{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .1s}
.game-header:hover{background:var(--s2)}
.game-item.open .game-header{background:var(--s3)}
.game-matchup{font-size:15px;font-weight:700}
.game-status-txt{font-size:11px;color:var(--muted);margin-top:1px}
.chevron{color:var(--muted);font-size:10px;transition:transform .2s}
.game-item.open .chevron{transform:rotate(180deg)}
.player-list{display:none;background:var(--bg)}
.game-item.open .player-list{display:block}
.team-label{padding:5px 14px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:var(--s2);border-bottom:1px solid var(--border)}
.player-row{padding:7px 14px 7px 18px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);transition:background .1s}
.player-row:hover{background:var(--s2)}
.player-row.active{background:var(--adim)}
.player-row.is-out{opacity:.4;cursor:not-allowed}
.pname{font-size:13px;font-weight:500;flex:1}
.ppos{font-size:11px;color:var(--muted)}
.out-tag{font-size:10px;background:#7f1d1d;color:#fca5a5;padding:1px 5px;border-radius:3px;flex-shrink:0}
.no-pl{padding:12px 14px;color:var(--muted);font-size:12px}

/* detail */
.detail{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.detail-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:8px}
.detail-empty .big{font-size:38px}

/* player detail */
.pd{padding:18px 20px}
.pd-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.pd-name{font-size:21px;font-weight:800}
.pd-meta{color:var(--muted);font-size:12px;margin-top:2px}
.opp-badge{background:var(--adim);border:1px solid var(--accent);border-radius:7px;padding:5px 11px;font-size:12px;color:#a5b4fc;font-weight:600}

/* stat tabs */
.stat-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.stab{background:var(--s2);border:1px solid var(--border);color:var(--muted);padding:5px 13px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.stab:hover{border-color:var(--accent);color:var(--text)}
.stab.on{background:var(--adim);border-color:var(--accent);color:#a5b4fc}

/* chart card */
.chart-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px}
.chart-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.chart-label{font-size:13px;font-weight:600}
.chart-hint{font-size:11px;color:var(--muted)}

/* chart wrap */
.chart-wrap{position:relative;cursor:pointer}
.chart-wrap canvas{display:block}

/* line control bar below chart */
.line-control{display:flex;align-items:center;gap:14px;margin-top:12px;flex-wrap:wrap}

/* line input */
.line-input-wrap{display:flex;align-items:center;gap:6px}
.line-input-wrap label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.line-input-wrap input[type=number]{
  background:var(--s2);border:1px solid var(--border);color:var(--yellow);
  padding:6px 10px;border-radius:6px;font-size:20px;font-weight:800;
  outline:none;width:90px;text-align:center;
  -moz-appearance:textfield;
}
.line-input-wrap input[type=number]::-webkit-inner-spin-button,
.line-input-wrap input[type=number]::-webkit-outer-spin-button{opacity:1;height:28px}
.line-input-wrap input[type=number]:focus{border-color:var(--yellow)}
.line-input-wrap input[type=number].empty{color:var(--muted);font-size:14px;font-weight:400}
.clear-line{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 8px;border-radius:6px;cursor:pointer;font-size:12px}
.clear-line:hover{border-color:var(--red);color:var(--red)}

.hit-stats{display:flex;gap:14px}
.hit-stat{text-align:center}
.hit-stat .hval{font-size:18px;font-weight:700}
.hit-stat .hlbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.hit-over{color:var(--green)}
.hit-under{color:var(--red)}

/* save row */
.save-row{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.save-row input{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:6px;font-size:12px;outline:none;width:110px}
.save-row input:focus{border-color:var(--accent)}
.save-row input::placeholder{color:#4b5563}

/* season strip */
.stat-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:7px;margin-bottom:14px}
.sbox{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:9px;text-align:center}
.sbox .val{font-size:19px;font-weight:700;color:var(--accent)}
.sbox .lbl{font-size:10px;color:var(--muted);margin-top:1px;text-transform:uppercase;letter-spacing:.3px}

/* log table */
.log-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
.log-title{padding:9px 14px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:var(--s2);border-bottom:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
thead th{background:var(--s2);padding:7px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);white-space:nowrap;border-bottom:1px solid var(--border)}
th.r,td.r{text-align:right}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--s2)}
td{padding:7px 12px;white-space:nowrap;font-size:13px}
.over-row td.val{color:var(--green);font-weight:600}
.under-row td.val{color:var(--red)}

/* game detail overlay */
.gd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center}
.gd-modal{background:var(--s1);border:1px solid var(--border);border-radius:14px;width:min(620px,95vw);max-height:90vh;overflow-y:auto;padding:22px 24px}
.gd-back{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-bottom:14px;padding:0;display:flex;align-items:center;gap:5px}
.gd-back:hover{color:var(--text)}
.gd-scoreboard{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:20px;padding:16px;background:var(--s2);border-radius:10px;border:1px solid var(--border)}
.gd-team{text-align:center;min-width:80px}
.gd-team-abbr{font-size:22px;font-weight:800}
.gd-team-name{font-size:11px;color:var(--muted);margin-top:2px}
.gd-score{font-size:36px;font-weight:900;color:var(--accent);min-width:40px;text-align:center}
.gd-score-sep{font-size:22px;color:var(--muted);margin:0 4px}
.gd-status{font-size:11px;color:var(--muted);text-align:center;margin-top:6px}
.gd-player-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.gd-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.gd-stat{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center}
.gd-stat .val{font-size:20px;font-weight:800;color:var(--text)}
.gd-stat .lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.gd-shooting{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.gd-pm{text-align:center;padding:8px;background:var(--s2);border:1px solid var(--border);border-radius:8px}
.gd-pm .val{font-size:18px;font-weight:700}
.gd-pm .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
/* clickable log rows */
tbody tr.clickable{cursor:pointer}
tbody tr.clickable:hover td{background:var(--s3)}
/* box score table */
.bs-wrap{overflow-x:auto}
.bs-team-label{padding:8px 14px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:var(--s2);border-bottom:1px solid var(--border);border-top:1px solid var(--border)}
.bs-wrap table td:first-child{font-weight:500;cursor:pointer;color:var(--text)}
.bs-wrap table td:first-child:hover{color:#a5b4fc;text-decoration:underline}
.bs-scoreboard{display:flex;align-items:center;justify-content:center;gap:18px;padding:16px 20px;background:var(--s2);border-bottom:1px solid var(--border)}
.bs-team-name{font-size:20px;font-weight:800}
.bs-score{font-size:38px;font-weight:900;color:var(--accent)}
.bs-sep{font-size:22px;color:var(--muted);margin:0 6px}
.bs-status{font-size:12px;color:var(--muted);text-align:center;padding:6px;background:var(--s2)}
.bs-header{padding:14px 20px 8px;display:flex;justify-content:space-between;align-items:flex-start;background:var(--s1)}
.bs-date{font-size:12px;color:var(--muted)}
.bs-hint{font-size:11px;color:var(--muted)}

/* toast */
.toast{position:fixed;bottom:16px;right:16px;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:13px;z-index:300;transition:opacity .25s}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
.toast.off{opacity:0;pointer-events:none}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{padding:30px;text-align:center;color:var(--muted)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<header>
  <div>
    <h1>NBA Props</h1>
    <span class="hdate" id="hdate"></span>
  </div>
  <div class="spacer"></div>
</header>


<div class="layout">
  <div class="sidebar">
    <div class="sidebar-title">Today's Games</div>
    <div id="games-list"><div class="loading"><span class="spin"></span>Loading…</div></div>
  </div>
  <div class="detail" id="detail">
    <div class="detail-empty">
      <div class="big">🏀</div>
      <div>Select a player from today's games</div>
    </div>
  </div>
</div>

<div class="toast off" id="toast"></div>

<script>
const API = '/api/v1';

let mode = { lb: 82, h2h: false };
let minMinutes = 0;
let activePlayer = null;
let activeStat = 'player_points';
let chartInstance = null;
let currentChartData = null; // { labels, values, minutes, avg }
let activeLine = null;       // float | null

const STATS = [
  {key:'player_points',   label:'PTS'},
  {key:'player_rebounds', label:'REB'},
  {key:'player_assists',  label:'AST'},
  {key:'player_threes',   label:'3PM'},
  {key:'player_blocks',   label:'BLK'},
  {key:'player_steals',   label:'STL'},
  {key:'player_turnovers',label:'TO'},
  {key:'player_pra',      label:'PRA'},
  {key:'player_pa',       label:'P+A'},
  {key:'player_ra',       label:'R+A'},
];

// ── Utils ──────────────────────────────────────────────────────────────────

async function api(path, opts={}) {
  const r = await fetch(API+path, opts);
  if (!r.ok) throw new Error(await r.text());
  if (r.status===204) return null;
  return r.json();
}

function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type}`;
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.add('off'), 2800);
}

const fmt = (v, d=1) => v==null ? '—' : (+v).toFixed(d);
const esc = s => s.replace(/'/g,"\\'");

// ── Init ───────────────────────────────────────────────────────────────────

window.onload = () => {
  const d = new Date();
  document.getElementById('hdate').textContent =
    d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',timeZone:'America/New_York'});
  loadGames();
  document.addEventListener('keydown', e => { if (e.key==='Escape') closeGameDetail(); });
};

// ── Mode ───────────────────────────────────────────────────────────────────

function setMode(btn) {
  document.querySelectorAll('.sample-pills .mpill').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  mode = { lb: +btn.dataset.lb, h2h: btn.dataset.h2h==='true' };
  if (activePlayer) loadPlayerDetail(activePlayer);
}

function onMinMinutesChange(val) {
  minMinutes = Math.max(0, parseFloat(val) || 0);
  if (activePlayer) loadPlayerDetail(activePlayer);
}

// ── Games sidebar ──────────────────────────────────────────────────────────

async function loadGames() {
  try {
    const data = await api('/games/today');
    renderGamesList(data.games||[]);
  } catch(e) {
    document.getElementById('games-list').innerHTML = '<div class="loading">No games today</div>';
  }
}

function renderGamesList(games) {
  const el = document.getElementById('games-list');
  if (!games.length) { el.innerHTML = '<div class="loading">No games scheduled</div>'; return; }
  el.innerHTML = games.map(g => `
    <div class="game-item" id="gi-${g.id}">
      <div class="game-header" onclick="toggleGame(${g.id},${g.home_team_id},${g.away_team_id},'${g.home_team_abbr||'?'}','${g.away_team_abbr||'?'}')">
        <div>
          <div class="game-matchup">${g.away_team_abbr||'?'} @ ${g.home_team_abbr||'?'}</div>
          ${g.away_score != null && g.home_score != null
            ? `<div class="game-status-txt">${g.away_score} – ${g.home_score} &nbsp;·&nbsp; ${g.status||''}</div>`
            : `<div class="game-status-txt">${g.status||'Scheduled'}</div>`
          }
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="player-list" id="pl-${g.id}">
        <div class="loading"><span class="spin"></span></div>
      </div>
    </div>`).join('');
}

async function toggleGame(gid, homeId, awayId, homeAbbr, awayAbbr) {
  const item = document.getElementById(`gi-${gid}`);
  const list = document.getElementById(`pl-${gid}`);
  const wasOpen = item.classList.contains('open');
  document.querySelectorAll('.game-item.open').forEach(el => el.classList.remove('open'));
  if (wasOpen) return;
  item.classList.add('open');
  list.innerHTML = '<div class="loading"><span class="spin"></span></div>';
  try {
    const data = await api(`/games/${gid}/players`);
    renderPlayerList(list, data, gid, homeId, awayId, homeAbbr, awayAbbr);
  } catch(e) {
    list.innerHTML = '<div class="no-pl">Could not load players</div>';
  }
}

function renderPlayerList(listEl, data, gid, homeId, awayId, homeAbbr, awayAbbr) {
  const players = data.players||[];
  if (!players.length) { listEl.innerHTML = '<div class="no-pl">No roster data</div>'; return; }
  const away = players.filter(p => p.team_id===awayId);
  const home = players.filter(p => p.team_id===homeId);
  const renderTeam = (team, myAbbr, oppId) => team.map(p => {
    const out = p.status==='OUT';
    return `<div class="player-row${out?' is-out':''}" id="pr-${p.id}"
      onclick="${out?'':` selectPlayer(${p.id},'${esc(p.full_name)}','${myAbbr}','${p.position||''}',${gid},'${homeAbbr}','${awayAbbr}',${oppId})`}">
      <span class="pname">${p.full_name}</span>
      ${p.position?`<span class="ppos">${p.position}</span>`:''}
      ${out?`<span class="out-tag">OUT</span>`:''}
    </div>`;
  }).join('');
  listEl.innerHTML = `
    <div class="team-label">${awayAbbr} — Away</div>
    ${renderTeam(away, awayAbbr, homeId)}
    <div class="team-label">${homeAbbr} — Home</div>
    ${renderTeam(home, homeAbbr, awayId)}`;
}

function renderBoxScore(detailEl, data) {
  const g = data.game;
  const hasScore = g.home_score != null && g.away_score != null;
  const homeWin  = hasScore && g.home_score > g.away_score;
  const awayWin  = hasScore && g.away_score > g.home_score;
  const B2B = '<span style="background:#7c2d12;color:#fca5a5;font-size:10px;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:5px">B2B</span>';

  const scoreHTML = hasScore
    ? `<div class="bs-team-name" style="${awayWin?'':'opacity:.45'}">${g.away_team_abbr||'?'}${g.away_b2b?B2B:''}</div>
       <div class="bs-score" style="${awayWin?'':'opacity:.45'}">${g.away_score}</div>
       <div class="bs-sep">–</div>
       <div class="bs-score" style="${homeWin?'':'opacity:.45'}">${g.home_score}</div>
       <div class="bs-team-name" style="${homeWin?'':'opacity:.45'}">${g.home_team_abbr||'?'}${g.home_b2b?B2B:''}</div>`
    : `<div class="bs-team-name">${g.away_team_abbr||'?'}${g.away_b2b?B2B:''}</div>
       <div style="font-size:14px;color:var(--muted);margin:0 12px">${g.status}</div>
       <div class="bs-team-name">${g.home_team_abbr||'?'}${g.home_b2b?B2B:''}</div>`;

  const cols = data.has_stats
    ? ['MIN','PTS','REB','AST','STL','BLK','TO','FG','3PT','FT','+/-']
    : [];

  const stat = v => v != null ? v : '—';
  const pm = v => v == null ? '—' : (v > 0 ? '+'+v : String(v));
  const pmColor = v => v > 0 ? 'var(--green)' : v < 0 ? 'var(--red)' : 'var(--muted)';

  function teamTable(players, teamAbbr) {
    if (!data.has_stats) {
      // just roster
      return players.map(p =>
        `<div class="player-row" onclick="selectPlayerFromBoxScore(${p.player_id},'${esc(p.name)}','${teamAbbr}','${p.position||''}')">
          <span class="pname">${p.name}</span>
          ${p.position ? `<span class="ppos">${p.position}</span>` : ''}
        </div>`
      ).join('');
    }
    const rows = players.map(p => {
      const fg = p.fg_made != null ? `${p.fg_made}/${p.fg_attempted}` : '—';
      const fg3 = p.fg3_made != null ? `${p.fg3_made}/${p.fg3_attempted}` : '—';
      const ft = p.ft_made != null ? `${p.ft_made}/${p.ft_attempted}` : '—';
      return `<tr>
        <td onclick="selectPlayerFromBoxScore(${p.player_id},'${esc(p.name)}','${teamAbbr}','${p.position||''}')">${p.name}${p.position?`<span style="color:var(--muted);font-size:10px;margin-left:4px">${p.position}</span>`:''}</td>
        <td class="r" style="color:var(--muted)">${stat(p.minutes)}</td>
        <td class="r" style="font-weight:700">${stat(p.points)}</td>
        <td class="r">${stat(p.rebounds)}</td>
        <td class="r">${stat(p.assists)}</td>
        <td class="r">${stat(p.steals)}</td>
        <td class="r">${stat(p.blocks)}</td>
        <td class="r" style="color:var(--red)">${stat(p.turnovers)}</td>
        <td class="r" style="color:var(--muted)">${fg}</td>
        <td class="r" style="color:var(--muted)">${fg3}</td>
        <td class="r" style="color:var(--muted)">${ft}</td>
        <td class="r" style="color:${pmColor(p.plus_minus)}">${pm(p.plus_minus)}</td>
      </tr>`;
    }).join('');
    return `<div class="bs-wrap"><table>
      <thead><tr>
        <th>Player</th>
        <th class="r">MIN</th><th class="r">PTS</th><th class="r">REB</th><th class="r">AST</th>
        <th class="r">STL</th><th class="r">BLK</th><th class="r">TO</th>
        <th class="r">FG</th><th class="r">3PT</th><th class="r">FT</th><th class="r">+/-</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  }

  detailEl.innerHTML = `
    <div class="bs-scoreboard">${scoreHTML}</div>
    ${hasScore ? `<div class="bs-status">${g.status} &nbsp;·&nbsp; ${g.date}</div>` : `<div class="bs-status">${g.date}</div>`}
    <div class="bs-team-label">${g.away_team_abbr} — Away</div>
    ${teamTable(data.away_players, g.away_team_abbr)}
    <div class="bs-team-label">${g.home_team_abbr} — Home</div>
    ${teamTable(data.home_players, g.home_team_abbr)}
  `;
}

function selectPlayerFromBoxScore(id, name, teamAbbr, pos) {
  // find the active game to get gameId and opponent
  const openGame = document.querySelector('.game-item.open');
  if (!openGame) return;
  const gid = parseInt(openGame.id.replace('gi-',''));
  // find player row in sidebar and click it if available
  const row = document.getElementById(`pr-${id}`);
  if (row && !row.classList.contains('is-out')) {
    row.click();
    return;
  }
  // fallback: load detail directly without opponent info
  document.querySelectorAll('.player-row').forEach(r=>r.classList.remove('active'));
  activePlayer = {id, name, teamAbbr, pos, gameId: gid, homeAbbr: teamAbbr, awayAbbr: teamAbbr, opponentTeamId: null};
  activeStat = 'player_points';
  activeLine = null;
  loadPlayerDetail(activePlayer);
}

// ── Player select ──────────────────────────────────────────────────────────

function selectPlayer(id, name, teamAbbr, pos, gameId, homeAbbr, awayAbbr, opponentTeamId) {
  document.querySelectorAll('.player-row').forEach(r=>r.classList.remove('active'));
  const row = document.getElementById(`pr-${id}`);
  if (row) row.classList.add('active');
  activePlayer = {id, name, teamAbbr, pos, gameId, homeAbbr, awayAbbr, opponentTeamId};
  activeStat = 'player_points';
  activeLine = null;
  loadPlayerDetail(activePlayer);
}

// ── Player detail ──────────────────────────────────────────────────────────

async function loadPlayerDetail(p) {
  const detail = document.getElementById('detail');
  detail.innerHTML = '<div class="loading" style="padding:60px"><span class="spin"></span>Loading…</div>';
  const oppId = mode.h2h ? p.opponentTeamId : null;
  try {
    const mmParam = minMinutes > 0 ? `&min_minutes=${minMinutes}` : '';
    const [chartData, stats] = await Promise.all([
      api(`/players/${p.id}/chart-data?market=${activeStat}&lookback=${mode.lb}${oppId?'&opponent_team_id='+oppId:''}${mmParam}`),
      api(`/players/${p.id}/stats`),
    ]);
    currentChartData = chartData;
    renderDetail(p, chartData, stats);
  } catch(e) {
    detail.innerHTML = '<div class="loading">Error loading player</div>';
  }
}

// ── Chart ──────────────────────────────────────────────────────────────────

function buildChart(chartData, line=null) {
  if (chartInstance) { chartInstance.destroy(); chartInstance=null; }
  const ctx = document.getElementById('main-chart');
  if (!ctx || !chartData.values.length) return;

  const values = chartData.values;
  const mins   = chartData.minutes || [];
  const avg = chartData.avg;
  const showMins = mins.length === values.length && mins.some(m => m > 0);

  const barColors = values.map(v => {
    if (line==null) return 'rgba(99,102,241,.75)';
    if (v > line)  return 'rgba(34,197,94,.8)';
    if (v < line)  return 'rgba(239,68,68,.7)';
    return 'rgba(156,163,175,.6)';
  });

  const annotations = {};
  if (avg!=null) {
    annotations.avg = {
      type:'line', yMin:avg, yMax:avg,
      borderColor:'rgba(99,102,241,.45)', borderWidth:1, borderDash:[5,4],
      label:{content:`Avg ${avg}`, display:true, position:'start',
             backgroundColor:'transparent', color:'#a5b4fc', font:{size:10}},
    };
  }
  if (line!=null) {
    annotations.userLine = {
      type:'line', yMin:line, yMax:line,
      borderColor:'rgba(245,158,11,.9)', borderWidth:2,
      label:{content:`Line ${line}`, display:true, position:'end',
             backgroundColor:'rgba(245,158,11,.15)', color:'#fbbf24',
             font:{size:11, weight:'bold'}, padding:4},
    };
  }

  const datasets = [{
    label: STATS.find(s=>s.key===activeStat)?.label||'',
    data: values,
    backgroundColor: barColors,
    borderColor: barColors.map(c=>c.replace(/[\d.]+\)$/,'1)')),
    borderWidth:1, borderRadius:4,
    yAxisID: 'y',
    order: 1,
  }];

  if (showMins) {
    datasets.push({
      label: 'MIN',
      data: mins,
      type: 'line',
      yAxisID: 'yMin',
      borderColor: 'rgba(251,191,36,.55)',
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      borderDash: [3,3],
      pointRadius: 2,
      pointBackgroundColor: 'rgba(251,191,36,.7)',
      tension: 0.3,
      order: 0,
    });
  }

  const scales = {
    x:{ticks:{color:'#6b7280',font:{size:10},maxRotation:45},grid:{color:'rgba(46,49,72,.4)'}},
    y:{ticks:{color:'#6b7280',font:{size:10}},grid:{color:'rgba(46,49,72,.4)'},beginAtZero:true},
  };
  if (showMins) {
    scales.yMin = {
      position:'right',
      beginAtZero:true,
      max:48,
      ticks:{color:'rgba(251,191,36,.6)',font:{size:9},callback:v=>v+'m'},
      grid:{drawOnChartArea:false},
    };
  }

  chartInstance = new Chart(ctx, {
    type:'bar',
    data:{ labels: chartData.labels, datasets },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:{duration:200},
      plugins:{
        legend:{
          display: showMins,
          labels:{color:'#6b7280',font:{size:10},boxWidth:12,padding:8},
        },
        annotation:{annotations},
        tooltip:{enabled:false},
      },
      events:['click'],
      scales,
    },
  });

  // set canvas height based on sample size
  const wrap = document.getElementById('chart-wrap');
  const h = Math.max(180, Math.min(320, 140 + values.length * 5));
  wrap.style.height = h + 'px';

  // click bar → open game detail
  ctx.onclick = (e) => {
    const els = chartInstance.getElementsAtEventForMode(e, 'nearest', {intersect: true}, false);
    if (!els.length) return;
    const idx = els[0].index;
    // chart is oldest→newest; game_ids matches that order
    const gids = currentChartData?.game_ids;
    if (gids && gids[idx] != null) openGameDetail(gids[idx]);
  };
}

// ── Line input handlers ────────────────────────────────────────────────────

function onLineInput(raw) {
  const val = parseFloat(raw);
  if (isNaN(val) || val < 0) return;
  activeLine = val;
  applyLineInPlace(val);
}

// Arrow up/down = ±0.5, Shift+arrow = ±1
function onLineKey(e) {
  const input = e.target;
  if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
    e.preventDefault();
    const step = e.shiftKey ? 1 : 0.5;
    const dir  = e.key === 'ArrowUp' ? 1 : -1;
    const cur  = parseFloat(input.value) || 0;
    const next = Math.max(0, Math.round((cur + dir * step) * 2) / 2);
    input.value = next;
    activeLine = next;
    applyLineInPlace(next);
  }
}

function applyLineInPlace(line) {
  if (!chartInstance || !currentChartData) return;

  // 1. Update annotation (no rebuild)
  const ann = chartInstance.options.plugins.annotation.annotations;
  ann.userLine = {
    type:'line', yMin:line, yMax:line,
    borderColor:'rgba(245,158,11,.9)', borderWidth:2,
    label:{content:`Line ${line}`, display:true, position:'end',
           backgroundColor:'rgba(245,158,11,.15)', color:'#fbbf24',
           font:{size:11,weight:'bold'}, padding:4},
  };

  // 2. Recolor bars in-place (dataset 0 is always the bar)
  const ds = chartInstance.data.datasets[0];
  ds.backgroundColor = currentChartData.values.map(v =>
    v > line ? 'rgba(34,197,94,.8)' : v < line ? 'rgba(239,68,68,.7)' : 'rgba(156,163,175,.6)'
  );
  ds.borderColor = currentChartData.values.map(v =>
    v > line ? '#22c55e' : v < line ? '#ef4444' : '#9ca3af'
  );

  chartInstance.update('none'); // instant, no animation

  // 3. Hit %
  const vals = currentChartData.values;
  const n = vals.length;
  const over  = vals.filter(v=>v>line).length;
  const under = vals.filter(v=>v<line).length;
  document.getElementById('hit-over-val').textContent  = n ? Math.round(over/n*100)+'%'  : '—';
  document.getElementById('hit-under-val').textContent = n ? Math.round(under/n*100)+'%' : '—';
  document.getElementById('hit-n-val').textContent     = n;
  document.getElementById('hit-stats').style.display   = 'flex';
  document.getElementById('save-row').style.display    = 'block';

  updateLogHighlight(line);
}

function clearLine() {
  activeLine = null;
  const inp = document.getElementById('line-input');
  if (inp) inp.value = '';

  if (chartInstance && currentChartData) {
    // remove annotation
    delete chartInstance.options.plugins.annotation.annotations.userLine;
    // reset bar colors (dataset 0 is always the bar)
    const ds = chartInstance.data.datasets[0];
    const def = 'rgba(99,102,241,.75)';
    ds.backgroundColor = currentChartData.values.map(() => def);
    ds.borderColor     = currentChartData.values.map(() => '#6366f1');
    chartInstance.update('none');
  }

  document.getElementById('hit-stats').style.display = 'none';
  document.getElementById('save-row').style.display  = 'none';
  updateLogHighlight(null);
}

// ── Log table ──────────────────────────────────────────────────────────────

function renderLog(chartData, statLabel) {
  if (!chartData.values.length) return '<div class="no-pl" style="padding:12px">No game log data</div>';
  const labels  = [...chartData.labels].reverse();
  const vals    = [...chartData.values].reverse();
  const mins    = chartData.minutes  ? [...chartData.minutes].reverse()  : [];
  const gids    = chartData.game_ids ? [...chartData.game_ids].reverse() : [];
  const hasMins = mins.length === vals.length;
  const hasGids = gids.length === vals.length;
  const rows = labels.map((lbl,i) => {
    const v   = vals[i];
    const m   = hasMins ? mins[i] : null;
    const gid = hasGids ? gids[i] : null;
    const clickable = gid != null;
    return `<tr id="logrow-${i}" class="${clickable?'clickable':''}" ${clickable?`onclick="openGameDetail(${gid})"`:''}>
      <td>${lbl}${clickable ? ' <span style="color:var(--muted);font-size:10px">↗</span>' : ''}</td>
      ${hasMins ? `<td class="r" style="color:var(--muted)">${m != null ? m : '—'}</td>` : ''}
      <td class="r val">${v}</td>
    </tr>`;
  }).join('');
  return `<table>
    <thead><tr>
      <th>Game</th>
      ${hasMins ? '<th class="r">MIN</th>' : ''}
      <th class="r">${statLabel}</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function updateLogHighlight(line) {
  // reversed order: newest first
  const vals = [...(currentChartData?.values||[])].reverse();
  const gids = currentChartData?.game_ids ? [...currentChartData.game_ids].reverse() : [];
  vals.forEach((v, i) => {
    const row = document.getElementById(`logrow-${i}`);
    if (!row) return;
    const hasLink = gids[i] != null;
    const cell = row.querySelector('.val');
    if (line==null) {
      row.className = hasLink ? 'clickable' : '';
      if(cell) cell.style.color='';
      return;
    }
    if (v > line)       row.className = 'over-row'  + (hasLink ? ' clickable' : '');
    else if (v < line)  row.className = 'under-row' + (hasLink ? ' clickable' : '');
    else { row.className = hasLink ? 'clickable' : ''; if(cell) cell.style.color='var(--muted)'; }
  });
}

// ── Stat switch ────────────────────────────────────────────────────────────

function switchStat(statKey) {
  activeStat = statKey;
  activeLine = null;
  if (activePlayer) loadPlayerDetail(activePlayer);
}

// ── Save line ──────────────────────────────────────────────────────────────

async function saveLine() {
  if (!activePlayer || activeLine==null) return;
  try {
    await api('/custom-lines',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        player_id:  activePlayer.id,
        game_id:    activePlayer.gameId,
        market_key: activeStat,
        over_line:  activeLine,
      }),
    });
    toast('Line saved!');
  } catch(e) { toast('Save failed','err'); }
}

// ── Game detail modal ──────────────────────────────────────────────────────

async function openGameDetail(gameId) {
  if (!activePlayer) return;
  let overlay = document.getElementById('gd-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'gd-overlay';
    overlay.className = 'gd-overlay';
    overlay.innerHTML = '<div class="gd-modal"><div class="loading" style="padding:40px"><span class="spin"></span>Loading…</div></div>';
    overlay.addEventListener('click', e => { if (e.target===overlay) closeGameDetail(); });
    document.body.appendChild(overlay);
  }
  overlay.style.display = 'flex';

  try {
    const data = await api(`/games/${gameId}/full-boxscore`);
    renderGameDetail(overlay, data);
  } catch(e) {
    overlay.querySelector('.gd-modal').innerHTML = `
      <button class="gd-back" onclick="closeGameDetail()">← Back</button>
      <div style="color:var(--muted);padding:20px">Could not load game data.</div>`;
  }
}

function closeGameDetail() {
  const overlay = document.getElementById('gd-overlay');
  if (overlay) overlay.style.display = 'none';
}

const B2B_TAG = '<span style="background:#7c2d12;color:#fca5a5;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:700;letter-spacing:.3px;margin-left:5px">B2B</span>';

function renderGameDetail(overlay, data) {
  const g = data.game;
  const hasScore = g.home_score != null && g.away_score != null;
  const homeWin  = hasScore && g.home_score > g.away_score;
  const awayWin  = hasScore && g.away_score > g.home_score;
  const parseMins = m => m ? parseFloat(m) : 0;

  function playerEntry(p, teamAbbr) {
    const mins = p.minutes != null ? p.minutes+'m' : '';
    const isActive = activePlayer && p.player_id === activePlayer.id;
    return `<div onclick="jumpToPlayer(${p.player_id},'${esc(p.name)}','${teamAbbr}','${p.position||''}')"
      style="display:flex;justify-content:space-between;padding:3px 0;cursor:pointer;border-radius:4px;${isActive?'color:#a5b4fc;font-weight:700;':''}">
      <span style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80%">${p.name}</span>
      <span style="font-size:11px;color:${isActive?'#a5b4fc':'var(--muted)'};flex-shrink:0;margin-left:4px">${mins}</span>
    </div>`;
  }

  function teamColumn(players, teamAbbr, score, isWinner, isB2b) {
    const sorted = [...players].sort((a,b) => parseMins(b.minutes) - parseMins(a.minutes));
    const scoreHTML = hasScore
      ? `<div style="font-size:32px;font-weight:900;color:var(--accent);opacity:${isWinner?1:.4};line-height:1">${score}</div>`
      : '';
    return `<div style="flex:1;min-width:0">
      <div style="text-align:center;margin-bottom:8px">
        <div style="font-size:18px;font-weight:800;opacity:${!hasScore||isWinner?1:.5}">${teamAbbr}${isB2b?B2B_TAG:''}</div>
        ${scoreHTML}
      </div>
      <div style="border-top:1px solid var(--border);padding-top:6px">
        ${sorted.length ? sorted.map(p=>playerEntry(p,teamAbbr)).join('') : '<div style="color:var(--muted);font-size:12px">No data</div>'}
      </div>
    </div>`;
  }

  const statusLine = hasScore ? `${g.status} · ${g.date}` : g.date;

  // Find active player's stats in the lineup data
  const allPlayers = [...data.away_players, ...data.home_players];
  const ap = activePlayer ? allPlayers.find(p => p.player_id === activePlayer.id) : null;
  const pct = (m, a) => m != null && a ? (m/a*100).toFixed(1)+'%' : '—';
  const pm = v => v == null ? '—' : (v > 0 ? '+'+v : String(v));
  const pmColor = ap?.plus_minus > 0 ? 'var(--green)' : ap?.plus_minus < 0 ? 'var(--red)' : 'var(--muted)';
  const stat = v => v != null ? v : '—';

  const playerStatsHTML = ap && ap.points != null ? `
    <div style="background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px">
      <div style="font-size:12px;font-weight:700;color:#a5b4fc;margin-bottom:10px">${activePlayer.name}</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px">
        <div style="text-align:center"><div style="font-size:20px;font-weight:800">${stat(ap.points)}</div><div style="font-size:10px;color:var(--muted)">PTS</div></div>
        <div style="text-align:center"><div style="font-size:20px;font-weight:800">${stat(ap.rebounds)}</div><div style="font-size:10px;color:var(--muted)">REB</div></div>
        <div style="text-align:center"><div style="font-size:20px;font-weight:800">${stat(ap.assists)}</div><div style="font-size:10px;color:var(--muted)">AST</div></div>
        <div style="text-align:center"><div style="font-size:20px;font-weight:800">${stat(ap.minutes)}m</div><div style="font-size:10px;color:var(--muted)">MIN</div></div>
        <div style="text-align:center"><div style="font-size:16px;font-weight:700">${stat(ap.steals)}</div><div style="font-size:10px;color:var(--muted)">STL</div></div>
        <div style="text-align:center"><div style="font-size:16px;font-weight:700">${stat(ap.blocks)}</div><div style="font-size:10px;color:var(--muted)">BLK</div></div>
        <div style="text-align:center"><div style="font-size:16px;font-weight:700">${stat(ap.turnovers)}</div><div style="font-size:10px;color:var(--muted)">TO</div></div>
        <div style="text-align:center"><div style="font-size:16px;font-weight:700;color:${pmColor}">${pm(ap.plus_minus)}</div><div style="font-size:10px;color:var(--muted)">+/-</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;font-size:12px;color:var(--muted);text-align:center">
        <div>${stat(ap.fg_made)}/${stat(ap.fg_attempted)} FG (${pct(ap.fg_made,ap.fg_attempted)})</div>
        <div>${stat(ap.fg3_made)}/${stat(ap.fg3_attempted)} 3PT (${pct(ap.fg3_made,ap.fg3_attempted)})</div>
        <div>${stat(ap.ft_made)}/${stat(ap.ft_attempted)} FT (${pct(ap.ft_made,ap.ft_attempted)})</div>
      </div>
    </div>` : '';

  overlay.querySelector('.gd-modal').innerHTML = `
    <button class="gd-back" onclick="closeGameDetail()">← Back to player</button>
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px">${statusLine}</div>
    ${playerStatsHTML}
    <div style="display:flex;gap:16px;align-items:flex-start">
      ${teamColumn(data.away_players, g.away_team_abbr||'?', g.away_score, awayWin, g.away_b2b)}
      <div style="width:1px;background:var(--border);align-self:stretch;flex-shrink:0"></div>
      ${teamColumn(data.home_players, g.home_team_abbr||'?', g.home_score, homeWin, g.home_b2b)}
    </div>`;
}

function jumpToPlayer(id, name, teamAbbr, pos) {
  closeGameDetail();
  const row = document.getElementById(`pr-${id}`);
  if (row && !row.classList.contains('is-out')) {
    row.click();
  }
}

</script>
</body>
</html>
